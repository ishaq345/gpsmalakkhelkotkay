<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admissions | GPS No.1 MALAK KHEL KOTKAY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-card { max-width: 750px; margin: 40px auto; background: white; border-radius: 44px; box-shadow: 0 30px 50px rgba(0,0,0,0.1); overflow: hidden; }
        .form-header { background: linear-gradient(110deg, #1e2a3a, #0f1a24); padding: 28px; text-align: center; color: white; }
        .form-body { padding: 36px 32px; }
        .input-group { margin-bottom: 22px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1.5px solid #e2e8f0; font-size: 0.95rem; transition: 0.2s; background: #fefefe; }
        .input-group textarea { border-radius: 28px; resize: vertical; }
        .input-group input:focus, .input-group select:focus { border-color: #e67e22; outline: none; box-shadow: 0 0 0 3px rgba(230,126,34,0.1); }
        .submit-btn { background: #e67e22; border: none; width: 100%; padding: 14px; border-radius: 60px; font-weight: bold; font-size: 1rem; color: white; cursor: pointer; transition: 0.2s; }
        .submit-btn:hover { background: #d35400; transform: scale(0.98); }
        .success { background: #2ecc71; color: white; padding: 12px; border-radius: 60px; text-align: center; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
<nav class="navbar"><div class="logo-flex"><img src="logo.png" class="logo-img" alt="logo"><span class="logo-text">GPS NO.1 MALAK KHEL KOTKAY</span></div><div class="mobile-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></div><ul class="nav-links" id="navMenu"><li><a href="index.html">Home</a></li><li><a href="about.html">About</a></li><li><a href="teachers.html">Teachers</a></li><li class="active"><a href="admission.html">Admissions</a></li><li><a href="index.html#contact">Contact</a></li></ul></nav>
<div class="hero-global"><h1>Admission 2026</h1><p>Secure your child's future – limited seats</p></div>
<div class="form-card"><div class="form-header"><h2><i class="fas fa-graduation-cap"></i> Online Registration</h2><p>Fill the form, our team will contact you</p></div><div class="form-body"><div id="msgSuccess" class="success"><i class="fas fa-check-circle"></i> Application submitted successfully!</div><form id="admissionForm"><div class="input-group"><input type="text" id="studentName" placeholder="Student full name" required></div><div class="input-group"><input type="text" id="fatherName" placeholder="Father's name" required></div><div class="input-group"><input type="date" id="dob" required></div><div class="input-group"><select id="class" required><option value="">Select Class</option><option>KG</option><option>Class 1</option><option>Class 2</option><option>Class 3</option><option>Class 4</option><option>Class 5</option></select></div><div class="input-group"><input type="tel" id="phone" placeholder="WhatsApp number" required></div><div class="input-group"><textarea id="address" rows="3" placeholder="Home address"></textarea></div><button type="submit" class="submit-btn" id="submitBtn"><i class="fas fa-paper-plane"></i> Submit Application</button></form></div></div>
<footer><p>© 2026 GPS No.1 Malak Khel Kotkay</p></footer>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = { apiKey: "AIzaSyCjVitoVg3ll1Zi1p_5GIR8oRJGgv96BSE", authDomain: "gpsno1-6e66e.firebaseapp.com", projectId: "gpsno1-6e66e", storageBucket: "gpsno1-6e66e.firebasestorage.app", messagingSenderId: "475460002683", appId: "1:475460002683:web:55730e4d7b51708a9993de" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app);
    document.getElementById('admissionForm').addEventListener('submit', async(e) => { e.preventDefault(); const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Submitting..."; try { await addDoc(collection(db, "Admissions"), { Name: document.getElementById('studentName').value, FatherName: document.getElementById('fatherName').value, DateOfBirth: document.getElementById('dob').value, Class: document.getElementById('class').value, Phone: document.getElementById('phone').value, Address: document.getElementById('address').value, Timestamp: new Date().toISOString() }); document.getElementById('msgSuccess').style.display = 'block'; document.getElementById('admissionForm').reset(); setTimeout(()=> document.getElementById('msgSuccess').style.display='none',4000); } catch(err) { alert("Error: "+err.message); } finally { btn.disabled=false; btn.innerHTML="<i class='fas fa-paper-plane'></i> Submit Application"; } });
</script>
<script>function toggleMenu(){document.getElementById('navMenu').classList.toggle('active');}</script>
</body>
</html>
